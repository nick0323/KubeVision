<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <!-- KubeVision Logo: Kubernetes-inspired hexagonal container with monitoring eye/vision element -->
  <!-- Background hexagon (represents K8s) -->
  <polygon points="60,2 110,15 110,30 60,38 10,30 10,15" fill="none" stroke="#1890ff" stroke-width="2"/>
  
  <!-- Inner hexagon -->
  <polygon points="60,8 105,18 105,28 60,34 15,28 15,18" fill="rgba(24,144,255,0.1)" stroke="none"/>
  
  <!-- Central circle (container/pod representation) -->
  <circle cx="60" cy="21" r="8" fill="#1890ff" opacity="0.9"/>
  
  <!-- Vision element: stylized "V" inside circle -->
  <path d="M56,24 L60,16 L64,24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Status indicators (monitoring dots) -->
  <circle cx="85" cy="10" r="2" fill="#52c41a"/>  <!-- healthy -->
  <circle cx="90" cy="10" r="2" fill="#faad14"/>  <!-- warning -->
  <circle cx="95" cy="10" r="2" fill="#ff4d4f"/>  <!-- danger -->
  
  <!-- Text: KubeVision -->
  <text x="60" y="56" font-family="Maple Mono, monospace" font-size="14" fill="#1890ff" text-anchor="middle" font-weight="500">KubeVision</text>
</svg>
