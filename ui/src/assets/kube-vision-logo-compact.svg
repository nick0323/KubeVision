<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- KubeVision Compact Logo: Hexagonal KV monogram -->
  <!-- Background hexagon -->
  <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="#1890ff" stroke-width="2"/>
  
  <!-- Inner circle -->
  <circle cx="20" cy="20" r="12" fill="rgba(24,144,255,0.1)" stroke="none"/>
  
  <!-- Stylized KV monogram -->
  <path d="M14,14 L14,26 M14,20 L19,14 M19,20 L14,26" fill="none" stroke="#1890ff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M22,14 L27,26 M27,14 L22,26" fill="none" stroke="#1890ff" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Status dot -->
  <circle cx="32" cy="8" r="3" fill="#52c41a"/>
</svg>
