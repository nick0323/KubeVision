# KubeVision 配置文件
# 敏感信息（密码、JWT Secret）请通过环境变量设置：
# - KUBEVISION_AUTH_PASSWORD: bcrypt 哈希后的密码
# - KUBEVISION_JWT_SECRET: JWT 签名密钥（建议 64 位以上）

auth:
    username: admin
    # password: 请通过环境变量 KUBEVISION_AUTH_PASSWORD 设置

cache:
    enabled: true
    maxsize: 1000
    ttl: 5m
    type: memory

jwt:
    # secret: 请通过环境变量 KUBEVISION_JWT_SECRET 设置

kubernetes:
    insecure: false
    kubeconfig: ""

log:
    format: console
    level: info

server:
    host: 0.0.0.0
    port: "8080"
