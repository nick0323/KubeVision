version: '3.8'

services:
  k8svision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k8svision
    ports:
      - "8080:8080"
    volumes:
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro
    environment:
      - K8SVISION_AUTH_USERNAME=${K8SVISION_AUTH_USERNAME:-admin}
      - K8SVISION_AUTH_PASSWORD=${K8SVISION_AUTH_PASSWORD}
      - K8SVISION_JWT_SECRET=${K8SVISION_JWT_SECRET}
      - K8SVISION_LOG_LEVEL=${K8SVISION_LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
