version: '3.8'

services:
  k8svision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k8svision
    ports:
      - "8080:8080"
    volumes:
      # 挂载 KubeConfig 文件（只读）
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro
      # 可选：挂载自定义配置文件
      # - ./config.yaml:/app/config.yaml:ro
    environment:
      # 认证配置（必填）
      - K8SVISION_AUTH_USERNAME=${K8SVISION_AUTH_USERNAME:-admin}
      - K8SVISION_AUTH_PASSWORD=${K8SVISION_AUTH_PASSWORD}
      # JWT Secret（必填，建议使用 64 字符以上的随机字符串）
      - K8SVISION_JWT_SECRET=${K8SVISION_JWT_SECRET}
      # 日志级别（可选：debug/info/warn/error）
      - K8SVISION_LOG_LEVEL=${K8SVISION_LOG_LEVEL:-info}
      # 服务器配置
      - K8SVISION_SERVER_HOST=0.0.0.0
      - K8SVISION_SERVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
